<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Markdown Loader</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            display: flex;
        }
        nav {
            width: 200px;
            border-right: 1px solid #ccc;
            padding-right: 10px;
        }
        #content {
            padding-left: 10px;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav id="toc"></nav>
    <div id="content">Loading...</div>

    <script>
        async function fetchMarkdown(file) {
            const response = await fetch(file);
            if (!response.ok) {
                throw new Error(`Failed to load ${file}`);
            }
            return await response.text();
        }

        function generateTOCAndSections(markdown) {
            const html = marked(markdown);
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const sections = Array.from(doc.querySelectorAll('h1, h2, h3, h4, h5, h6'));

            const toc = sections.map((el, index) => {
                return `<div style="margin-left: ${20 * (el.tagName[1] - 1)}px;">
                            <a href="javascript:void(0)" onclick="showSection(${index})">${el.textContent}</a>
                        </div>`;
            }).join('');

            const contentSections = sections.map((el, index) => {
                let content = el.outerHTML;
                let sibling = el.nextElementSibling;
                while (sibling && !sibling.tagName.match(/^H[1-6]$/)) {
                    content += sibling.outerHTML;
                    sibling = sibling.nextElementSibling;
                }
                return content;
            });

            document.getElementById('toc').innerHTML = toc;
            window.contentSections = contentSections;
            showSection(0);  // Show the first section by default
        }

        function showSection(index) {
            document.getElementById('content').innerHTML = window.contentSections[index];
        }

        async function initialize() {
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');

            if (!file) {
                document.getElementById('content').innerHTML = '<p>Error: No book file specified.</p>';
                return;
            }

            try {
                const markdown = await fetchMarkdown(file);
                generateTOCAndSections(markdown);
            } catch (error) {
                document.getElementById('content').innerHTML = `<p>${error.message}</p>`;
            }
        }

        initialize();
    </script>
</body>
</html>
