<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Markdown Loader</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            display: flex;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #sidebar {
            width: 200px;
            border-right: 1px solid #ccc;
            padding-right: 10px;
            overflow-y: auto;
            position: fixed;
            height: 100vh;
            background-color: #f4f4f4;
            z-index: 1000;
            display: none;
        }
        #content {
            padding-left: 20px;
            margin-left: 210px;
            width: 100%;
        }
        .navigation {
            text-align: center;
            margin: 20px 0;
        }
        .navigation a {
            margin: 0 10px;
            text-decoration: none;
            color: #007BFF;
        }
        .navigation a:hover {
            text-decoration: underline;
        }
        .toggle-sidebar {
            position: fixed;
            top: 10px;
            left: 10px;
            cursor: pointer;
            font-size: 18px;
            background: #007BFF;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <button class="toggle-sidebar" onclick="toggleSidebar()">Show Sidebar</button>
    <nav id="sidebar"></nav>
    <div id="content">
        <div class="navigation" id="top-navigation"></div>
        <div id="chapter-content">Loading...</div>
        <div class="navigation" id="bottom-navigation"></div>
    </div>

    <script>
        async function fetchMarkdown(file) {
            const response = await fetch(file);
            if (!response.ok) {
                throw new Error(`Failed to load ${file}`);
            }
            return await response.text();
        }

        function generateTOCAndChapters(markdown) {
            const html = marked.parse(markdown);
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const chapters = Array.from(doc.querySelectorAll('h1'));

            const toc = chapters.map((el, index) => {
                return `<div>
                            <a href="javascript:void(0)" onclick="showChapter(${index})">${el.textContent}</a>
                        </div>`;
            }).join('');

            const chapterContents = chapters.map((el, index) => {
                let content = el.outerHTML;
                let sibling = el.nextElementSibling;
                while (sibling && !sibling.tagName.match(/^H[1]$/)) {
                    content += sibling.outerHTML;
                    sibling = sibling.nextElementSibling;
                }
                return content;
            });

            document.getElementById('sidebar').innerHTML = toc;
            window.chapterContents = chapterContents;
            showChapter(0);  // Show the first chapter by default
        }

        function showChapter(index) {
            document.getElementById('chapter-content').innerHTML = window.chapterContents[index];
            updateNavigation(index);
        }

        function updateNavigation(index) {
            const totalChapters = window.chapterContents.length;
            const topNav = document.getElementById('top-navigation');
            const bottomNav = document.getElementById('bottom-navigation');
            let navContent = '';

            if (index > 0) {
                navContent += `<a href="javascript:void(0)" onclick="showChapter(${index - 1})">&laquo; Previous Chapter</a>`;
            }

            if (index < totalChapters - 1) {
                navContent += `<a href="javascript:void(0)" onclick="showChapter(${index + 1})">Next Chapter &raquo;</a>`;
            }

            topNav.innerHTML = navContent;
            bottomNav.innerHTML = navContent;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleButton = document.querySelector('.toggle-sidebar');
            if (sidebar.style.display === 'none') {
                sidebar.style.display = 'block';
                toggleButton.textContent = 'Hide Sidebar';
            } else {
                sidebar.style.display = 'none';
                toggleButton.textContent = 'Show Sidebar';
            }
        }

        async function initialize() {
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');

            if (!file) {
                document.getElementById('chapter-content').innerHTML = '<p>Error: No book file specified.</p>';
                return;
            }

            try {
                const markdown = await fetchMarkdown(file);
                generateTOCAndChapters(markdown);
            } catch (error) {
                document.getElementById('chapter-content').innerHTML = `<p>${error.message}</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
