<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Splitter</title>
    <meta name="description" content="Tool to split Markdown files by heading levels.">
    <link rel="stylesheet" href="/modules/markdown-splitter/styles/markdown-splitter.css">
</head>
<body>
    <div class="container">
        <h1>Markdown Splitter</h1>
        <div class="form-group">
            <label for="fileInput">Upload Markdown File</label>
            <input type="file" id="fileInput" accept=".md">
        </div>
        <div class="form-group">
            <label for="headingLevel">Heading Level to Split (1-6)</label>
            <input type="number" id="headingLevel" min="1" max="6" value="1">
        </div>
        <div class="form-group">
            <button id="splitButton" type="button">Split Markdown</button>
        </div>
        <div class="results" id="results" aria-live="polite"></div>
    </div>

    <script type="module" src="/modules/markdown-splitter/scripts/markdown-splitter.js"></script>
</body>
</html>
