<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Markdown Loader</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="book-loader.js"></script>
    <style>
        #debug {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #f8f8f8;
            border-top: 1px solid #ccc;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        #sidebar.visible {
            display: block;
        }
        #sidebar {
            display: none;
        }
    </style>
</head>
<body>
    <button class="toggle-sidebar" id="toggle-sidebar">Show Sidebar</button>
    <nav id="sidebar" aria-label="Table of Contents"></nav>
    <div id="content">
        <div class="navigation" id="top-navigation" aria-label="Chapter Navigation"></div>
        <div id="chapter-content">Loading...</div>
        <div class="navigation" id="bottom-navigation" aria-label="Chapter Navigation"></div>
    </div>
    <div id="debug"></div>
</body>
</html>
