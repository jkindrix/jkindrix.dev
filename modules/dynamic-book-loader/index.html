<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Markdown Loader</title>
    <link rel="stylesheet" href="/modules/dynamic-book-loader/styles/book-loader.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/highlight.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.2.8/dist/purify.min.js" defer></script>
    <script type="module">
        document.addEventListener("DOMContentLoaded", () => {
            import('/modules/dynamic-book-loader/scripts/book-loader.js');
        });
    </script>
</head>
<body>
    <button class="toggle-sidebar" id="toggle-sidebar">Show Sidebar</button>
    <nav id="sidebar" aria-label="Table of Contents"></nav>
    <div id="content">
        <div class="navigation" id="top-navigation" aria-label="Chapter Navigation"></div>
        <div id="chapter-content">Loading...</div>
        <div class="navigation" id="bottom-navigation" aria-label="Chapter Navigation"></div>
    </div>
    <div id="debug"></div>
</body>
</html>
